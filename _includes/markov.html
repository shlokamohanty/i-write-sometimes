<div class="markov-wrap">
  <div class="mc-label">corpus</div>
  <textarea id="mc-corpus">Words are funny. Some words go in from one ear and out the other. Some words stay. Some sting and stay. Some heal and stay. Some fill your heart and stay. Some words remain with me longer than I thought. I write words better than I say them. I'll use a pen to weave the words about how I feel for you, but my voice will choke up when I try to tell you. I have a lot to say, but I'm at a loss for words, so I write.</textarea>

  <div class="mc-row">
    <label>n =</label>
    <input type="range" id="mc-nval" min="1" max="3" value="2" step="1">
    <span id="mc-nout">2</span>
    <label>length</label>
    <input type="range" id="mc-lenval" min="8" max="60" value="20" step="1">
    <span id="mc-lenout">20</span>
    <button id="mc-genbtn">generate</button>
  </div>

  <div class="mc-generated" id="mc-genout">press generate</div>

  <div class="mc-label">markov chain</div>
  <div id="mc-p5mount"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
(function(){
  var corpusEl  = document.getElementById('mc-corpus');
  var nSlider   = document.getElementById('mc-nval');
  var nOut      = document.getElementById('mc-nout');
  var lenSlider = document.getElementById('mc-lenval');
  var lenOut    = document.getElementById('mc-lenout');
  var genBtn    = document.getElementById('mc-genbtn');
  var genOut    = document.getElementById('mc-genout');

  nSlider.addEventListener('input',   function(){ nOut.textContent   = nSlider.value; rebuild(); });
  lenSlider.addEventListener('input', function(){ lenOut.textContent = lenSlider.value; });
  corpusEl.addEventListener('input',  function(){ rebuild(); });

  var chain = {}, lastPath = [], lastResult = [];

  function tokenize(txt){ return txt.toLowerCase().match(/[\w']+/g) || []; }

  function buildChain(n){
    chain = {};
    var t = tokenize(corpusEl.value);
    for(var i = 0; i < t.length - n; i++){
      var key = t.slice(i, i+n).join(' ');
      if(!chain[key]) chain[key] = [];
      chain[key].push(t[i+n]);
    }
  }

  function generate(){
    var n = +nSlider.value, len = +lenSlider.value;
    buildChain(n);
    var keys = Object.keys(chain);
    if(!keys.length){ genOut.innerHTML = 'not enough text'; return; }
    var seed   = keys[Math.floor(Math.random()*keys.length)].split(' ');
    var result = seed.slice(), path = [seed.join(' ')];
    for(var i = 0; i < len; i++){
      var key   = result.slice(-n).join(' ');
      var nexts = chain[key];
      if(!nexts) break;
      var w = nexts[Math.floor(Math.random()*nexts.length)];
      result.push(w);
      path.push(key);
    }
    lastPath   = path;
    lastResult = result;
    genOut.innerHTML = result.join(' ');
    if(window._mcP5) window._mcP5.onNewData(path, chain, result);
  }

  genBtn.addEventListener('click', generate);
  function rebuild(){ buildChain(+nSlider.value); if(window._mcP5) window._mcP5.onNewData(lastPath, chain, lastResult); }
  buildChain(2);

  new p5(function(p){
    window._mcP5 = p;
    var W, H;
    var steps = [];
    var PINK  = [232,160,176];
    var BEIGE = [160,148,128];

    // node dims
    var NW = 90, NH = 32, VGAP = 68;

    function buildSteps(path, ch, result){
      steps = [];
      if(!path.length) return;
      var maxShow = Math.min(path.length, 14);
      for(var i = 0; i < maxShow; i++){
        var key     = path[i];
        var allNext = ch[key] ? Array.from(new Set(ch[key])) : [];
        var chosen  = null;
        if(i < path.length - 1){
          chosen = path[i+1].split(' ').slice(-1)[0];
        }
        steps.push({ key: key, options: allNext, chosen: chosen });
      }
    }

    function computeLayout(){
      if(!steps.length) return;
      // max pills per row based on width
      var maxOpts = 0;
      steps.forEach(function(s){ maxOpts = Math.max(maxOpts, s.options.length); });
      var pillW = 46, pillGap = 6;
      var pillRowW = maxOpts * (pillW + pillGap) - pillGap;
      NW = Math.max(80, Math.min(100, W * 0.3));
      // center column x
      var cx = W / 2;
      H = steps.length * VGAP + 80;
      p.resizeCanvas(W, H);
      document.getElementById('mc-p5mount').style.height = H + 'px';
      steps.forEach(function(s, i){
        s.x = cx;
        s.y = 40 + i * VGAP;
        s.w = NW;
        s.h = NH;
        s.pillW = Math.min(pillW, (W - 20) / Math.max(s.options.length, 1) - pillGap);
      });
    }

    p.setup = function(){
      var mount = document.getElementById('mc-p5mount');
      W = 300; H = 400;
      mount.style.height = H + 'px';
      var cnv = p.createCanvas(W, H);
      cnv.parent('mc-p5mount');
      p.textFont('monospace');
      p.noLoop();
      buildChain(2);
      setTimeout(function(){
        W = document.getElementById('mc-p5mount').offsetWidth || 300;
        generate();
      }, 150);
    };

    p.onNewData = function(path, ch, result){
      W = document.getElementById('mc-p5mount').offsetWidth || W;
      buildSteps(path, ch, result);
      computeLayout();
      p.redraw();
    };

    p.draw = function(){
      p.background(33,28,22);
      if(!steps.length){
        p.fill(144,137,124); p.noStroke();
        p.textSize(11); p.textAlign(p.CENTER,p.CENTER);
        p.text('press generate', W/2, H/2);
        return;
      }

      // vertical connectors between nodes
      for(var i = 0; i < steps.length - 1; i++){
        var a = steps[i], b = steps[i+1];
        p.stroke(...PINK, 110); p.strokeWeight(1.5);
        p.line(a.x, a.y + a.h/2, b.x, b.y - b.h/2 - 7);
        // arrowhead pointing down
        p.fill(...PINK, 150); p.noStroke();
        p.triangle(b.x, b.y - b.h/2,
                   b.x - 4, b.y - b.h/2 - 8,
                   b.x + 4, b.y - b.h/2 - 8);
      }

      // option pills branching to the right of each node
      steps.forEach(function(s){
        if(!s.options.length) return;
        var count  = s.options.length;
        var pw     = s.pillW;
        var ph     = 18;
        var startX = s.x + s.w/2 + 18;
        var totalH = count * (ph + 5) - 5;
        var startY = s.y - totalH/2 + ph/2;

        // horizontal stem from node right edge
        p.stroke(...BEIGE, 50); p.strokeWeight(0.6);
        p.line(s.x + s.w/2, s.y, startX, s.y);

        s.options.forEach(function(opt, oi){
          var ox       = startX + pw/2;
          var oy       = startY + oi * (ph + 5);
          var isChosen = opt === s.chosen;

          // small line from stem to pill
          p.strokeWeight(isChosen ? 1.4 : 0.5);
          p.stroke(isChosen ? p.color(...PINK,180) : p.color(255,255,255,18));
          p.line(startX, s.y, ox - pw/2, oy);

          // pill
          p.rectMode(p.CENTER); p.noStroke();
          p.fill(isChosen ? p.color(...PINK,210) : p.color(...BEIGE,45));
          p.rect(ox, oy, pw, ph, 3);

          // label
          p.textAlign(p.CENTER,p.CENTER);
          p.textSize(7.5);
          p.fill(isChosen ? 33 : 190, isChosen ? 22 : 175, isChosen ? 22 : 155,
                 isChosen ? 255 : 95);
          var label = opt.length > 7 ? opt.slice(0,6)+'…' : opt;
          p.text(label, ox, oy);
        });
      });

      // nodes
      steps.forEach(function(s, i){
        p.rectMode(p.CENTER);
        p.fill(...BEIGE, i===0 ? 215 : 175);
        p.stroke(...PINK, i===0 ? 230 : 130);
        p.strokeWeight(i===0 ? 2 : 1.2);
        p.rect(s.x, s.y, s.w, s.h, 5);

        p.noStroke();
        p.textAlign(p.CENTER,p.CENTER);
        p.fill(240,235,225,235);
        var words = s.key.split(' ');
        if(words.length === 2){
          p.textSize(8.5);
          p.text(words[0], s.x, s.y - 5.5);
          p.text(words[1], s.x, s.y + 5.5);
        } else {
          p.textSize(9);
          p.text(s.key.length>11 ? s.key.slice(0,10)+'…' : s.key, s.x, s.y);
        }

        if(i===0){
          p.textSize(7); p.fill(...PINK,170);
          p.textAlign(p.CENTER,p.CENTER);
          p.text('start', s.x, s.y - s.h/2 - 8);
        }
        if(i===steps.length-1){
          p.textSize(7); p.fill(...BEIGE,130);
          p.textAlign(p.CENTER,p.CENTER);
          p.text('end', s.x, s.y + s.h/2 + 10);
        }
      });

      // legend
      p.textAlign(p.LEFT,p.BOTTOM);
      p.textSize(8.5); p.fill(144,137,124,120); p.noStroke();
      p.text('n = '+nSlider.value+'  ·  pink = chosen  ·  dim = other options', 8, H-6);
    };

  }, document.getElementById('mc-p5mount'));

  window.addEventListener('resize', function(){
    if(!window._mcP5) return;
    window._mcP5.onNewData(lastPath, chain, lastResult);
  });
})();
</script>
