<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Serif:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/css/main.css' | relative_url }}" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}" />
  <style>
    :root {
      --header-texture: url("{{ '/Ideation_Iteration6.jpg' | relative_url }}");
      --side-texture: url("{{ '/IMG_2357_3.JPG' | relative_url }}");
    }
  </style>
</head>
<body>

  <div class="site-wrap">

    <header class="site-header">
      <div class="header-texture"></div>
      <div class="header-inner">
        <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>home</a>
          <a href="{{ '/archive.html' | relative_url }}"{% if page.url contains 'archive' %} class="active"{% endif %}>archive</a>
        </nav>
      </div>
    </header>

    <main class="site-main">
      {% if page.layout == 'home' %}
        <div class="home-columns">
          <div class="col-left">
            {% include markov.html %}
          </div>
          <div class="col-right">
            {{ content }}
          </div>
        </div>
      {% else %}
        {{ content }}
      {% endif %}
    </main>

    <footer class="site-footer">
      <span>{{ site.author }} · {{ site.title }}</span>
      <span class="footer-sep">·</span>
      <a href="{{ '/feed.xml' | relative_url }}">rss</a>
    </footer>

  </div>

</body>
</html>
